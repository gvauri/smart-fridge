services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartfridge
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-devuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devpassword}
    volumes:
      - mongodb_dev_data:/data/db

  backend:
    build:
      context: ./smart-fridge-java-backend
    container_name: smart-fridge-backend
    expose:
      - "8080"
    environment:
      MONGO_USER: ${MONGO_USER:-devuser}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-devpassword}
      JWT_SECRET: ${JWT_SECRET:-defaultsecret}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MONGO_PROD_URI: ${MONGO_PROD_URI:-mongodb://${MONGO_USER:-devuser}:${MONGO_PASSWORD:-devpassword}@mongodb:27017/smartfridge?authSource=admin}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./smart-fridge-frontend
    container_name: smart-fridge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_dev_data:
