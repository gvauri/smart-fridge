<h2 mat-dialog-title>Neues Item</h2>

<mat-dialog-content>
  <form [formGroup]="formAdd" class="form-container">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name"/>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Icon</mat-label>
      <mat-select formControlName="icon">
        @for (icon of iconTypes; track icon) {
          <mat-option [value]="icon">{{ icon }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Kaufdatum</mat-label>
      <input matInput [matDatepicker]="buyingPicker" formControlName="buyingDate"/>
      <mat-datepicker #buyingPicker/>
      <mat-datepicker-toggle matSuffix [for]="buyingPicker"/>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Ablaufdatum</mat-label>
      <input matInput [matDatepicker]="expirationPicker" formControlName="expirationDate"/>
      <mat-datepicker #expirationPicker/>
      <mat-datepicker-toggle matSuffix [for]="expirationPicker"/>
    </mat-form-field>


    <mat-form-field appearance="outline">
      <mat-label>Menge</mat-label>
      <input matInput type="number" formControlName="amount"/>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Beschreibung</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
  </form>

  @if (hasErrorOccurred()) {
    <app-message-box [type]="MessageType.ERROR" [message]="errorMessage()"/>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Abbrechen</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="formAdd.invalid">Erstellen</button>
</mat-dialog-actions>
