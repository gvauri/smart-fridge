<img [ngSrc]="item().icon" [alt]="item().icon" class="img" width="500" height="500" priority>
<div class="description-container">
  <h2>{{ item().name }}</h2>
  <p>Ablaufdatum: {{ item().expirationDate | date:'dd.MM.yyyy' }}</p>
  <p>Kaufsdatum: {{ item().buyingDate | date:'dd.MM.yyyy' }}</p>
  <p>Anzahl: {{ item().amount }}</p>
  <p>{{ item().description }}</p>
</div>
<div class="action-panel">
  <button mat-icon-button><mat-icon svgIcon="edit"/></button>
  <button mat-icon-button color="warn"><mat-icon svgIcon="delete"/></button>
</div>
